version: "3.9"

services:
  cryptoai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cryptoai-engine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: ["python", "main.py", "daemon"]

  cryptoai-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cryptoai-dashboard
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:8501:8501"
    command: ["streamlit", "run", "dashboard.py", "--server.address=0.0.0.0", "--server.port=8501"]
